<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Otomatik Yanıt Yöneticisi</title>

  <!-- Office JS -->
  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
  <!-- Fluent UI Core (temel stil) -->
  <link rel="stylesheet"
    href="https://static2.sharepointonline.com/files/fabric/office-ui-fabric-core/11.0.0/css/fabric.min.css">

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 12px;
      background: #f5f5f5;
      min-height: 100vh;
      box-sizing: border-box
    }

    .container {
      width: 100%;
      max-width: 100%;
      margin: 0;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .1);
      padding: 16px;
      box-sizing: border-box;
      min-height: calc(100vh - 24px)
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
      border-bottom: 2px solid #0078d4;
      padding-bottom: 12px
    }

    .header h1 {
      color: #0078d4;
      font-size: 20px;
      margin: 0;
      font-weight: 600
    }

    .form-group {
      margin-bottom: 16px;
      position: relative
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #323130
    }

    .form-control {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #d1d1d1;
      border-radius: 4px;
      font-size: 14px;
      box-sizing: border-box
    }

    .form-control:focus {
      outline: none;
      border-color: #0078d4;
      box-shadow: 0 0 0 2px rgba(0, 120, 212, .2)
    }

    .date-time-group{
  display:flex;
  flex-wrap:nowrap;       /* asla alt satıra düşmesin */
  gap:8px;
  justify-content:center; /* grubu ortala */
  align-items:center;
}
.date-time-group .form-control{ width:auto; min-width:0; } /* global 100%'ü kır */
.date-time-group input[type="date"]{ flex:1 1 160px; }     /* tarih esner */
.date-time-group input[type="time"]{ flex:0 0 15ch; }  

    .btn {
      background: #0078d4;
      color: #fff;
      border: none;
      padding: 12px 24px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-top: 16px
    }

    .btn:hover {
      background: #106ebe
    }

    .btn:disabled {
      background: #d1d1d1;
      cursor: not-allowed
    }

    .preview-section {
      margin-top: 20px;
      padding: 12px;
      background: #f8f9fa;
      border-radius: 4px;
      border-left: 4px solid #0078d4;
      max-height: 220px;
      overflow-y: auto
    }

    .preview-section h3 {
      margin: 0 0 12px 0;
      color: #323130;
      font-size: 16px
    }

    .preview-content {
      font-size: 13px;
      line-height: 1.5;
      color: #605e5c;
      white-space: pre-line
    }

    .status-message {
      padding: 12px;
      border-radius: 4px;
      margin-top: 16px;
      text-align: center;
      font-weight: 600;
      display: none
    }

    .status-success {
      background: #dff6dd;
      color: #107c10;
      border: 1px solid #92c5f7
    }

    .status-error {
      background: #fde7e9;
      color: #d13438;
      border: 1px solid #d13438
    }

    .oof-status-banner {
      background: #fff4e6;
      border: 1px solid #ffb366;
      border-radius: 4px;
      padding: 12px;
      margin-bottom: 16px;
      color: #cc7a00;
      font-weight: 600;
      text-align: center;
      display: none
    }

    .colleague-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid #d1d1d1;
      border-top: none;
      border-radius: 0 0 4px 4px;
      max-height: 240px;
      overflow-y: auto;
      z-index: 1000;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .1);
      display: none
    }

    .user-row {
      padding: 8px 12px;
      cursor: pointer;
      border-bottom: 1px solid #f3f2f1
    }

    .user-row:hover {
      background: #f3f2f1
    }

    .dn {
      font-size: 14px
    }

    .em,
    .meta {
      color: #666;
      font-size: 12px
    }
  </style>
</head>

<body>
  <div class="container">
    <div id="oofStatusBanner" class="oof-status-banner">
      <span id="oofStatusText">📧 Otomatik yanıt şu anda aktif</span>
    </div>

    <div class="header">
      <h1>🏢 Otomatik Yanıt Yöneticisi</h1>
    </div>

    <form id="autoReplyForm">
      <div class="form-group">
        <label for="templateSelect">Şablon Türü <span style="color:#d13438">*</span></label>
        <select id="templateSelect" class="form-control" required>
          <option value="izin">🏖️ Yıllık İzin</option>
          <option value="bayram">🎉 Bayram</option>
          <option value="gorevlendirme">📋 Görevlendirme</option>
          <option value="yurtdisi">✈️ Yurtdışı Seyahati</option>
        </select>
      </div>

      <div class="form-group">
        <label>Vekalet edecek yetkili var mı?</label>
        <div style="display:flex;gap:16px;margin-top:4px">
          <label style="font-weight:400;cursor:pointer"><input type="radio" name="hasDelegate" value="yes" checked style="margin-right:4px">Evet</label>
          <label style="font-weight:400;cursor:pointer"><input type="radio" name="hasDelegate" value="no" style="margin-right:4px">Hayır</label>
        </div>
      </div>

      <div class="form-group" id="delegateSection">
        <label for="user-search-input">Yetkili Vekil / Acil Durumda Erişilecek Kişi <span style="color:#d13438">*</span></label>
        <input type="text" id="user-search-input" class="form-control" placeholder="Kişi ara..." autocomplete="off">
        <div id="users-results" class="colleague-dropdown"></div>
        <input type="hidden" id="selected-colleague-id">
      </div>

      <div class="form-group">
        <label for="startDate">Başlangıç Tarihi ve Saati</label>
        <div class="date-time-group">
          <input type="date" id="startDate" class="form-control" required>
          <input type="time" id="startTime" class="form-control" required>
        </div>
      </div>

      <div class="form-group">
        <label for="endDate">Bitiş Tarihi ve Saati</label>
        <div class="date-time-group">
          <input type="date" id="endDate" class="form-control" required>
          <input type="time" id="endTime" class="form-control" required>
        </div>
      </div>

      <div id="statusMessage" class="status-message"></div>

      <button type="submit" id="btnSetAutoReply" class="btn">Otomatik Yanıtı Ayarla</button>
    </form>

    <div class="preview-section">
      <h3>📧 Mesaj Önizleme</h3>
      <div id="messagePreview" class="preview-content">Lütfen tüm alanları doldurun...</div>
      <button id="copyPreviewButton" class="btn" type="button" style="width:auto;margin-top:8px">📋 Kopyala</button>
    </div>

    <div
      style="text-align:center;margin-top:20px;padding-top:16px;border-top:1px solid #e1dfdd;font-size:12px;color:#605e5c;">
      <span id="versionInfo">Sürüm: 1.0.10 | Son Güncelleme: <span id="lastUpdate"></span></span>
    </div>

    <div id="instructionsModal" class="modal" style="display:none;">
      <div class="modal-content">
        <h3>📋 Otomatik Yanıt Ayarlama Talimatları</h3>
        <div id="instructionsContent"></div>
        <button id="btnModalOk" class="btn" type="button">Anladım</button>
      </div>
    </div>
  </div>

  <!-- MSAL (NAA) -->
  <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@4.22.0/lib/msal-browser.min.js"></script>
  <script>
    /* =======================
       AYARLAR (Admin consent: MailboxSettings.ReadWrite + User.Read.All)
    ======================= */
    const CLIENT_ID = "c2a8b650-50b2-446e-a8e9-bffa6698b77f";
    const TENANT_ID = "26371b5e-948e-4791-a055-003c90306b8c";
    const GRAPH_SCOPES_OOF = ["MailboxSettings.ReadWrite", "openid", "profile"];
    const GRAPH_SCOPES_USERS = ["User.Read.All", "openid", "profile"]; // istek üzerine

    const messageTemplates = {
      izin: {
        subject: "Otomatik Yanıt: Yıllık İzin / Automatic Reply: Annual Leave",
        reasonTr: "yıllık izinde",
        reasonEn: "on annual leave",
        body: `Sayın Yetkili,

E-postanız için teşekkür ederim. {startDate} – {endDate} tarihleri arasında yıllık izinde olacağım ve bu süre içinde e-postalarınıza yanıt veremeyeceğim.

{contactLine}

Anlayışınız için teşekkür eder, iyi çalışmalar dilerim.

Saygılarımla,
{userName}
{positionLine}
{company}

---

Dear Sir/Madam,

Thank you for your email. I will be out of the office on annual leave from {startDate} to {endDate}, and will not be able to respond to your message during this period.

{contactLineEn}

Thank you for your understanding.

Kind regards,
{userName}
{positionLine}
{company}`
      },
      bayram: {
        subject: "Otomatik Yanıt: Bayram Tatili / Automatic Reply: Public Holiday",
        reasonTr: "bayram tatilinde",
        reasonEn: "on public holiday leave",
        body: `Sayın Yetkili,

E-postanız için teşekkür ederim. {startDate} – {endDate} tarihleri arasında bayram tatili nedeniyle ofiste bulunmayacağım ve e-postalarınıza yanıt veremeyeceğim.

{contactLine}

İyi bayramlar dilerim.

Saygılarımla,
{userName}
{positionLine}
{company}

---

Dear Sir/Madam,

Thank you for your email. I will be out of the office due to a public holiday from {startDate} to {endDate}, and will not be able to respond to your message during this period.

{contactLineEn}

Wishing you a happy holiday.

Kind regards,
{userName}
{positionLine}
{company}`
      },
      gorevlendirme: {
        subject: "Otomatik Yanıt: Görevlendirme / Automatic Reply: Business Assignment",
        reasonTr: "görevlendirme nedeniyle ofis dışında",
        reasonEn: "away on a business assignment",
        body: `Sayın Yetkili,

E-postanız için teşekkür ederim. {startDate} – {endDate} tarihleri arasında görevlendirme nedeniyle ofis dışında olacağım ve e-postalarınıza geç yanıt verebilirim.

{contactLine}

Anlayışınız için teşekkür eder, iyi çalışmalar dilerim.

Saygılarımla,
{userName}
{positionLine}
{company}

---

Dear Sir/Madam,

Thank you for your email. I will be away on a business assignment from {startDate} to {endDate}, and may have limited access to my emails during this period.

{contactLineEn}

Thank you for your understanding.

Kind regards,
{userName}
{positionLine}
{company}`
      },
      yurtdisi: {
        subject: "Otomatik Yanıt: Yurtdışı Seyahati / Automatic Reply: International Travel",
        reasonTr: "yurtdışı seyahati nedeniyle ofis dışında",
        reasonEn: "abroad on international travel",
        body: `Sayın Yetkili,

E-postanız için teşekkür ederim. {startDate} – {endDate} tarihleri arasında yurtdışı seyahati nedeniyle ofis dışında olacağım ve e-postalarınıza yanıt vermem gecikebilir.

{contactLine}

Anlayışınız için teşekkür eder, iyi çalışmalar dilerim.

Saygılarımla,
{userName}
{positionLine}
{company}

---

Dear Sir/Madam,

Thank you for your email. I will be abroad on international travel from {startDate} to {endDate}, and my response may be delayed during this period.

{contactLineEn}

Thank you for your understanding.

Kind regards,
{userName}
{positionLine}
{company}`
      }
    };

    function getSelectedTemplate() {
      const key = $("templateSelect").value;
      return messageTemplates[key];
    }

    /* =======================
       GLOBAL DURUM
    ======================= */
    let pca = null;                 // MSAL PCA
    let selectedColleague = null;   // { id, name, email, phone, jobTitle }
    let lastUserResults = [];       // enter ile hızlı seçim için
    let tokenCache = {};            // scope->token

    /* =======================
          PEOPLE ARAMA
       ======================= */
    const PEOPLE_SCOPES = ["People.Read", "openid", "profile"];

    async function searchPeople(q, top = 25) {
      const token = await getGraphToken(PEOPLE_SCOPES); // senin MSAL/NAA token fonksiyonun
      const url = "https://graph.microsoft.com/v1.0/me/people"
        + `?$search="${q}"`
        + "&$select=displayName,scoredEmailAddresses,mail,userPrincipalName,jobTitle,companyName,phones"
        + `&$top=${top}`;

      const res = await fetch(url, {
        headers: {
          "Authorization": `Bearer ${token}`,
          "Content-Type": "application/json",
          "ConsistencyLevel": "eventual"   // $search için şart
        }
      });
      if (!res.ok) throw new Error(`People API ${res.status}: ${await res.text()}`);
      const data = await res.json();

      return (data.value || []).map(p => ({
        id: p.id,
        name: p.displayName,
        email: p.mail || p.userPrincipalName || (p.scoredEmailAddresses?.[0]?.address ?? ""),
        jobTitle: p.jobTitle || "",
        company: p.companyName || "",
        phone: (p.phones && p.phones[0]?.number) || ""
      }));
    }

    /* =======================
          PEOPLE ARAMA SON
       ======================= */

    /* =======================
       YARDIMCI FONK.
    ======================= */
    const $ = id => document.getElementById(id);
    const debounce = (fn, ms = 300) => { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); } };

    function todayISODate() {
      const d = new Date();
      const pad = n => String(n).padStart(2, "0");
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
    }

    function formatDisplayDate(dateStr, timeStr) {
      const d = new Date(`${dateStr}T${timeStr}`);
      return d.toLocaleDateString('tr-TR', { day: '2-digit', month: '2-digit', year: 'numeric' }) + ` ${timeStr}`;
    }

    function showStatus(type, message) {
      const el = $("statusMessage");
      el.className = `status-message ${type === "success" ? "status-success" : "status-error"}`;
      el.textContent = message;
      el.style.display = "block";
      setTimeout(() => { el.style.display = "none"; }, 8000);
    }

    function refreshDateConstraints() {
      const sD = $("startDate"), eD = $("endDate");
      if (!sD.value) return;
      eD.min = sD.value;
      if (eD.value && eD.value < sD.value) {
        eD.value = sD.value;
      }
    }

    function bindDateTimeInputs() {
      ["startDate", "startTime", "endDate", "endTime"].forEach(id => {
        const input = $(id);
        const handleChange = () => {
          refreshDateConstraints();
          updatePreview();
        };
        input.addEventListener("change", handleChange);
        input.addEventListener("input", handleChange);
      });
    }

    function setDefaultDates() {
      const sD = $("startDate"), eD = $("endDate"), sT = $("startTime"), eT = $("endTime");
      const today = todayISODate();
      sD.min = eD.min = today;
      sD.value = today;
      eD.value = today;
      sT.value = "07:30"; eT.value = "17:30";
      refreshDateConstraints();
      updatePreview();
    }

    /* =======================
       MSAL / TOKEN
    ======================= */
    async function ensurePCA() {
      if (pca) return;
      pca = await msal.createNestablePublicClientApplication({
        auth: { clientId: CLIENT_ID, authority: "https://login.microsoftonline.com/" + TENANT_ID }
      });
      window.pca = pca;
    }
    async function getGraphToken(scopes) {
      await ensurePCA();
      const key = scopes.slice().sort().join(" ");
      if (tokenCache[key]) return tokenCache[key];
      try {
        const r = await pca.acquireTokenSilent({ scopes });
        return tokenCache[key] = r.accessToken;
      } catch {
        const r2 = await pca.acquireTokenPopup({ scopes });
        return tokenCache[key] = r2.accessToken;
      }
    }

    /* =======================
       KULLANICI ARAMA
    ======================= */
    async function graphGET(url, token, extraHeaders = {}) {
      const res = await fetch(url, { headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json", ...extraHeaders } });
      if (!res.ok) throw new Error("Graph " + res.status + ": " + (await res.text()));
      return res.json();
    }

    async function searchUsersPrefix(q, top = 25, select = "displayName,mail,userPrincipalName,jobTitle,mobilePhone,businessPhones,givenName,surname") {
      const token = await getGraphToken(GRAPH_SCOPES_USERS);
      const esc = q.replace(/'/g, "''");
      const filter = `startsWith(displayName,'${esc}') or startsWith(mail,'${esc}') or startsWith(userPrincipalName,'${esc}') or startsWith(givenName,'${esc}') or startsWith(surname,'${esc}')`;
      const url = `https://graph.microsoft.com/v1.0/users?$select=${encodeURIComponent(select)}&$filter=${encodeURIComponent(filter)}&$top=${top}`;
      const data = await graphGET(url, token);
      return (data.value || []).map(u => ({
        id: u.id,
        name: u.displayName || "(adsız)",
        email: u.mail || u.userPrincipalName || "",
        jobTitle: u.jobTitle || "",
        phone: (u.mobilePhone || (u.businessPhones && u.businessPhones[0])) || ""
      }));
    }

    async function listUsersInitial(top = 30, select = "displayName,mail,userPrincipalName,jobTitle,mobilePhone,businessPhones") {
      const token = await getGraphToken(GRAPH_SCOPES_USERS);
      const url = `https://graph.microsoft.com/v1.0/users?$select=${encodeURIComponent(select)}&$top=${top}`;
      const data = await graphGET(url, token);
      return (data.value || []).map(u => ({
        id: u.id,
        name: u.displayName || "(adsız)",
        email: u.mail || u.userPrincipalName || "",
        jobTitle: u.jobTitle || "",
        phone: (u.mobilePhone || (u.businessPhones && u.businessPhones[0])) || ""
      }));
    }

    function renderUsers(list) {
      lastUserResults = list.slice();
      const box = $("users-results");
      box.innerHTML = "";
      if (!list.length) { box.style.display = "none"; return; }

      const frag = document.createDocumentFragment();
      list.forEach((u, idx) => {
        const div = document.createElement("div");
        div.className = "user-row";
        div.setAttribute("data-index", idx);
        div.innerHTML = `
          <div class="dn"><strong>${u.name}</strong></div>
          <div class="em">${u.email}</div>
          <div class="meta">${u.jobTitle}${u.jobTitle && u.phone ? ' · ' : ''}${u.phone || ''}</div>`;
        div.addEventListener("click", () => selectUser(u));
        frag.appendChild(div);
      });
      box.appendChild(frag);
      box.style.display = "block";
    }

    function selectUser(u) {
      selectedColleague = u;
      $("selected-colleague-id").value = u.id;
      $("user-search-input").value = u.name;
      $("users-results").style.display = "none";
      updatePreview();
    }

    function initUserSearch() {
      const input = $("user-search-input");
      const dropdown = $("users-results");

      input.addEventListener("input", () => {
        // seçim zorunluluğu: yazınca sıfırla
        selectedColleague = null;
        $("selected-colleague-id").value = "";
      });

      const handler = debounce(async () => {
        const q = input.value.trim();
        try {
          if (!q) renderUsers(await listUsersInitial());
          else renderUsers(await searchUsersPrefix(q, 25));
        } catch (e) { console.error("[users] hata:", e.message || e); }
      }, 300);

      input.addEventListener("focus", handler);
      input.addEventListener("input", handler);

      // Enter → listedeki ilk kullanıcıyı seç
      input.addEventListener("keydown", (ev) => {
        if (ev.key === "Enter") {
          ev.preventDefault();
          if (lastUserResults.length) selectUser(lastUserResults[0]);
        }
      });

      document.addEventListener("click", (e) => {
        if (!dropdown.contains(e.target) && e.target !== input) dropdown.style.display = "none";
      });
    }

    /* =======================
       ÖNİZLEME / MESAJ
    ======================= */
    function hasDelegate() {
      return document.querySelector('input[name="hasDelegate"]:checked')?.value === 'yes';
    }

    function buildContactLines(col) {
      if (!col || !hasDelegate()) {
        return {
          tr: 'Acil konularınız için lütfen başka bir yetkiliye başvurun.',
          en: 'For urgent matters, please contact another authorized person.'
        };
      }
      let tr = 'Acil konularınız için';
      let en = 'For urgent matters, please contact';
      if (col.name) { tr += ` ${col.name} ile`; en += ` ${col.name}`; }
      if (col.email) { tr += ` ${col.email}`; en += ` at ${col.email}`; }
      if (col.phone) { tr += ` veya ${col.phone}`; en += ` or ${col.phone}`; }
      tr += ' üzerinden iletişime geçebilirsiniz.'; en += '.';
      return { tr, en };
    }

    async function getUserProfile() {
      try {
        const token = await getGraphToken(["User.Read", "openid", "profile"]);
        const res = await fetch("https://graph.microsoft.com/v1.0/me?$select=displayName,mail,userPrincipalName,jobTitle,companyName", {
          headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" }
        });
        if (!res.ok) throw new Error("Graph " + res.status);
        const u = await res.json();
        return {
          displayName: u.displayName || '',
          emailAddress: u.mail || u.userPrincipalName || '',
          jobTitle: u.jobTitle || '',
          companyName: u.companyName || 'Öztiryakiler'
        };
      } catch (e) {
        const up = Office?.context?.mailbox?.userProfile || {};
        return {
          displayName: up.displayName || '',
          emailAddress: up.emailAddress || '',
          jobTitle: up.jobTitle || '',
          companyName: 'Öztiryakiler'
        };
      }
    }

    function updatePreview() {
      const preview = $("messagePreview");
      const sD = $("startDate").value, sT = $("startTime").value;
      const eD = $("endDate").value, eT = $("endTime").value;

      const delegateRequired = hasDelegate();
      if (delegateRequired && !selectedColleague) {
        preview.textContent = "Lütfen tüm alanları doldurun...";
        return;
      }
      if (!sD || !sT || !eD || !eT) {
        preview.textContent = "Lütfen tüm alanları doldurun...";
        return;
      }

      const template = getSelectedTemplate();
      const startDisp = formatDisplayDate(sD, sT);
      const endDisp = formatDisplayDate(eD, eT);

      const up = Office?.context?.mailbox?.userProfile || {};
      const positionLine = up.jobTitle || "";
      const company = 'Öztiryakiler';
      const contact = buildContactLines(selectedColleague);

      const body = template.body
        .replaceAll('{startDate}', startDisp)
        .replaceAll('{endDate}', endDisp)
        .replaceAll('{contactLine}', contact.tr)
        .replaceAll('{contactLineEn}', contact.en)
        .replaceAll('{userName}', up.displayName || '')
        .replaceAll('{positionLine}', positionLine)
        .replaceAll('{company}', company);

      preview.textContent = `Konu: ${template.subject}\n\n${body}`;
    }

    // YERİNE GEÇSİN: setOOFWithGraphMessage(...)
    async function setOOFWithGraphMessage(messageBody, sD, sT, eD, eT) {
      let s = new Date(`${sD}T${sT}:00`);
      let e = new Date(`${eD}T${eT}:00`);
      const now = new Date();

      if (e <= s) throw new Error("Bitiş tarihi başlangıçtan sonra olmalı.");

      // Başlangıç geçmişteyse Graph 400: InvalidScheduledOofDuration verir → en az 1 dk ileri al
      if (s <= now) {
        s = new Date(now.getTime() + 60 * 1000);
        if (e <= s) e = new Date(s.getTime() + 60 * 1000);
      }

      const fmt = d => d.toISOString().slice(0, 19); // yyyy-MM-ddTHH:mm:ss (UTC)
      const token = await getGraphToken(GRAPH_SCOPES_OOF);

      const body = {
        automaticRepliesSetting: {
          status: "scheduled",
          externalAudience: "all",
          scheduledStartDateTime: { dateTime: fmt(s), timeZone: "UTC" },
          scheduledEndDateTime: { dateTime: fmt(e), timeZone: "UTC" },
          internalReplyMessage: messageBody,
          externalReplyMessage: messageBody
        }
      };

      const res = await fetch("https://graph.microsoft.com/v1.0/me/mailboxSettings", {
        method: "PATCH",
        headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      if (!res.ok) throw new Error(await res.text());
    }


    function bindCopyPreview() {
      $("copyPreviewButton").addEventListener("click", () => {
        const txt = $("messagePreview").textContent || "";
        const ta = document.createElement("textarea");
        ta.value = txt; document.body.appendChild(ta);
        ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
        const btn = $("copyPreviewButton"); const old = btn.textContent;
        btn.textContent = "✅ Kopyalandı!"; setTimeout(() => btn.textContent = old, 30000);
      });
    }

    // Fetch current OOF status from Graph API
    async function getOofStatus() {
      try {
        const token = await getGraphToken(GRAPH_SCOPES_OOF);
        const res = await fetch("https://graph.microsoft.com/v1.0/me/mailboxSettings/automaticRepliesSetting", {
          headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" }
        });

        if (!res.ok) {
          console.error("Failed to fetch OOF status:", res.status);
          return null;
        }

        const data = await res.json();
        return data;
      } catch (error) {
        console.error("Error fetching OOF status:", error);
        return null;
      }
    }

    // Show OOF banner with actual status from API
    async function showOofBannerUntil(dateObj) {
      const tz = "Turkey Standard Time";
      const fmtLocal = d => {
        const p = n => String(n).padStart(2, "0");
        return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds() || 0)}`;
      };

      const b = $("oofStatusBanner"), t = $("oofStatusText");

      // Try to get actual OOF status from API
      const oofSettings = await getOofStatus();

      if (oofSettings && (oofSettings.status === "enabled" || oofSettings.status === "scheduled")) {
        // Use the end date from API if available
        let endDateText = "";
        if (oofSettings.scheduledEndDateTime) {
          const endDate = new Date(oofSettings.scheduledEndDateTime.dateTime);
          var showendDate = new Date(endDate.getTime() - endDate.getTimezoneOffset() * 60 * 1000);
          console.log('fmtLocal(s):', showendDate);
          // console.log('oofSettings:', fmtLocal(s));
          endDateText = ` (${showendDate.toLocaleDateString('tr-TR')} ${showendDate.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' })} tarihine kadar)`;
        } else if (dateObj) {
          endDateText = ` (${dateObj.toLocaleDateString('tr-TR')} ${dateObj.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' })} tarihine kadar)`;
        }

        t.textContent = `📧 Otomatik yanıt şu anda aktif${endDateText}`;
        b.style.display = "block";
      } else {
        // Hide banner if no active OOF
        b.style.display = "none";
      }
    }

    /* =======================
       FORM OLAYLARI
    ======================= */
    async function onSubmit(ev) {
      ev.preventDefault();

      const delegateRequired = hasDelegate();

      // Vekil seçimi zorunluysa kontrol et
      if (delegateRequired && (!selectedColleague || !$("selected-colleague-id").value)) {
        $("user-search-input").focus();
        showStatus("error", "Lütfen arama yapıp listeden bir kişi seçin.");
        return;
      }

      const sD = $("startDate").value, sT = $("startTime").value;
      const eD = $("endDate").value, eT = $("endTime").value;
      if (!sD || !sT || !eD || !eT) {
        showStatus("error", "Lütfen tüm alanları doldurun!");
        return;
      }
      const s = new Date(`${sD}T${sT}`), e = new Date(`${eD}T${eT}`);
      if (s >= e) {
        showStatus("error", "Bitiş tarihi başlangıçtan sonra olmalı.");
        return;
      }

      const btn = $("btnSetAutoReply");
      btn.disabled = true; btn.textContent = "Ayarlanıyor...";

      try {
        const user = await getUserProfile();
        const template = getSelectedTemplate();

        const contact = buildContactLines(selectedColleague);
        const startDisp = formatDisplayDate(sD, sT);
        const endDisp = formatDisplayDate(eD, eT);
        const positionLine = user.jobTitle || "";

        let contactHtmlTr = '<p>Acil konularınız için lütfen başka bir yetkiliye başvurun.</p>';
        let contactHtmlEn = '<p>For urgent matters, please contact another authorized person.</p>';

        if (delegateRequired && selectedColleague) {
          contactHtmlTr = `<p>Acil konularınız için <strong>${selectedColleague.name}</strong> ile
            ${selectedColleague.email ? `<a href="mailto:${selectedColleague.email}">${selectedColleague.email}</a>` : ''}
            ${selectedColleague.phone ? ` veya <a href="tel:${selectedColleague.phone.replace(/\s+/g, '')}">${selectedColleague.phone}</a>` : ''} 
            üzerinden iletişime geçebilirsiniz.</p>`;
          contactHtmlEn = `<p>For urgent matters, please contact <strong>${selectedColleague.name}</strong>
            ${selectedColleague.email ? ` at <a href="mailto:${selectedColleague.email}">${selectedColleague.email}</a>` : ''}
            ${selectedColleague.phone ? ` or <a href="tel:${selectedColleague.phone.replace(/\s+/g, '')}">${selectedColleague.phone}</a>` : ''}.</p>`;
        }

        const messageBodyHtml = `
        <p>Sayın Yetkili,</p>
        <p>E-postanız için teşekkür ederim. ${startDisp} – ${endDisp} tarihleri arasında <strong>${template.reasonTr}</strong> olacağım ve bu süre içinde e-postalarınıza yanıt veremeyeceğim.</p>
        ${contactHtmlTr}
        <p>Teşekkür eder, iyi çalışmalar dilerim.</p>
        <p>Saygılarımla,<br>${user.displayName}<br>${positionLine || ''}<br>${user.companyName || 'Öztiryakiler'}</p>
        <hr>
        <p>Dear Sir/Madam,</p>
        <p>Thank you for your email. I will be <strong>${template.reasonEn}</strong> from ${startDisp} to ${endDisp} and will not be able to respond to your message during this period.</p>
        ${contactHtmlEn}
        <p>Kind regards,<br>${user.displayName}<br>${positionLine || ''}<br>${user.companyName || 'Öztiryakiler'}</p>
        `;

        await setOOFWithGraphMessage(messageBodyHtml, sD, sT, eD, eT);
        updatePreview();
        showStatus("success", "Otomatik yanıt başarıyla ayarlandı!");
        showOofBannerUntil(e);
      } catch (err) {
        console.error("OOF hata:", err);
        showStatus("error", "Otomatik yanıt ayarlanırken hata: " + (err.message || err));
      } finally {
        btn.disabled = false; btn.textContent = "Otomatik Yanıtı Ayarla";
      }
    }

    /* =======================
       INIT
    ======================= */
    function initDelegateToggle() {
      const radios = document.querySelectorAll('input[name="hasDelegate"]');
      const section = $("delegateSection");
      radios.forEach(r => r.addEventListener('change', () => {
        const show = hasDelegate();
        section.style.display = show ? 'block' : 'none';
        if (!show) {
          selectedColleague = null;
          $("selected-colleague-id").value = '';
          $("user-search-input").value = '';
        }
        updatePreview();
      }));
    }

    function initTemplateSelect() {
      $("templateSelect").addEventListener('change', updatePreview);
    }

    Office.onReady(async () => {
      await ensurePCA();
      setDefaultDates();
      bindDateTimeInputs();
      initTemplateSelect();
      initDelegateToggle();
      initUserSearch();
      bindCopyPreview();
      updatePreview();
      $("lastUpdate").textContent = new Date().toLocaleDateString('tr-TR');
      $("autoReplyForm").addEventListener("submit", onSubmit);
      $("btnModalOk").addEventListener("click", () => { $("instructionsModal").style.display = "none"; });

      // Check and show current OOF status
      await showOofBannerUntil();
    });
  </script>
